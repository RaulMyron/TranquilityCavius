<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRANQUILITY_CLAVIUS_ADMISSION</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Orbitron:wght@500;700&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #fdfdfd;
            --primary: #d4af37;
            --secondary: #222;
            --text: #1a1a1a;
            --accent: #8b0000;
            --font-main: 'Cinzel', serif;
            --font-title: 'Cinzel', serif;
            --box-bg: rgba(255, 255, 255, 0.95);
        }

        .dark-mode {
            --bg-color: #020205; /* Preto absoluto */
            --primary: #bc13fe;   /* Roxo Neon */
            --secondary: #00e5ff; /* Ciano Tech */
            --text: #e0e0e0;
            --font-main: 'VT323', monospace;
            --font-title: 'Orbitron', sans-serif;
            --box-bg: rgba(10, 10, 20, 0.9);
            background-image: none !important;
        }

        * { box-sizing: border-box; cursor: crosshair; }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle, #fff 0%, #e0e0e0 100%);
            font-family: var(--font-main);
            color: var(--text);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.6s ease;
            overflow-x: hidden;
        }

        body::before {
            content: " "; display: block; position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 10; background-size: 100% 4px; pointer-events: none;
        }

        .wrapper {
            width: 100%; max-width: 600px;
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
            position: relative; z-index: 5;
        }

        /* Botão de Audio Centralizado no Topo */
        .audio-main-ctrl {
            text-align: center; margin-bottom: 5px;
        }

        .btn-audio {
            background: none; border: 1px solid var(--primary);
            color: var(--primary); padding: 8px 15px;
            font-family: var(--font-title); font-size: 0.7rem;
            letter-spacing: 2px; cursor: pointer; transition: 0.3s;
        }

        .header-ui {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--primary); padding-bottom: 10px;
        }

        .mode-toggle {
            background: none; border: 1px solid var(--primary);
            color: var(--primary); font-family: var(--font-main);
            padding: 4px 10px; cursor: pointer; font-size: 0.7rem;
        }

        .terminal {
            width: 100%; background: var(--box-bg);
            border: 2px solid var(--primary); padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; gap: 15px;
        }

        h1 {
            font-family: var(--font-title); font-size: clamp(1.4rem, 5vw, 2rem); 
            color: var(--primary); text-align: center; margin: 0; letter-spacing: 4px;
        }

        .luxe-options {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            font-size: 0.9rem; font-style: italic;
        }

        @media (max-width: 450px) { .luxe-options { grid-template-columns: 1fr; } }

        .btn-claim {
            width: 100%; padding: 18px;
            background: none; border: 2px solid var(--primary);
            color: var(--primary); font-family: var(--font-title);
            font-size: 0.9rem; transition: 0.4s; cursor: pointer;
            text-transform: uppercase;
        }

        .btn-claim:hover { background: var(--primary); color: #fff; }

        .footer-ui {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.7rem; opacity: 0.8; padding-top: 10px;
        }

        .help-btn { cursor: help; color: var(--primary); }

        footer:hover::after {
            content: " - DON'T GO. THEY ARE LISTENING.";
            color: var(--accent); font-weight: bold;
        }

        input[type=range] { accent-color: var(--primary); width: 60px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="audio-main-ctrl">
        <button class="btn-audio" onclick="toggleAudio()" id="audioBtn">
            <i class="fas fa-play"></i> REPRODUZIR ÁUDIO AMBIENTE
        </button>
    </div>

    <div class="header-ui">
        <button class="mode-toggle" onclick="toggleMode()" id="toggleBtn">MODO_TERMINAL</button>
        <div style="display:flex; align-items:center; gap:8px;">
            <i class="fas fa-volume-high" style="font-size:0.7rem; color:var(--primary)"></i>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.3" oninput="updateVolume()">
        </div>
    </div>

    <main class="terminal" id="mainTerminal">
        <h1>TRANQUILITY CLAVIUS</h1>
        
        <p style="text-align: center; font-size: 1.1rem;">
            VOCÊ FOI SORTEADO!<br>
            <span style="font-size: 0.8rem; opacity: 0.8;">A Arasaka apresenta o ápice do luxo orbital.</span>
        </p>

        <div class="luxe-options">
            • OPORTUNIDADE DE EMPREGO<br>
            • CHANCE DE FICAR RICO<br>
            • UM NOVO COMEÇO...<br>
            • TODOS SÃO BEM-VINDOS.
        </div>

        <button class="btn-claim" onclick="initAdmission()">RECLAMAR MINHA CHANCE</button>
    </main>

    <div class="footer-ui">
        <span id="footerText">ARASAKA CORP <i class="fas fa-microchip"></i> 2063</span>
        <span class="help-btn" onclick="showHelp()"><i class="fas fa-question-circle"></i> AJUDA</span>
    </div>
</div>

<audio id="bgMusic" loop><source src="som.mp3" type="audio/mpeg"></audio>

<script>
    const audio = document.getElementById('bgMusic');
    const audioBtn = document.getElementById('audioBtn');
    let helpCount = 0;

    function toggleAudio() {
        if (audio.paused) {
            audio.play();
            audioBtn.innerHTML = '<i class="fas fa-pause"></i> PAUSAR ÁUDIO';
        } else {
            audio.pause();
            audioBtn.innerHTML = '<i class="fas fa-play"></i> REPRODUZIR ÁUDIO';
        }
    }

    function toggleMode() {
        document.body.classList.toggle('dark-mode');
        document.getElementById('toggleBtn').innerText = 
            document.body.classList.contains('dark-mode') ? "MODO_NEO_KITSCH" : "MODO_TERMINAL";
    }

    function updateVolume() { audio.volume = document.getElementById('volumeSlider').value; }

    function showHelp() {
        if(helpCount === 0) {
            alert('AURA_ERROR: "Não vá... é tudo mentira."');
            helpCount++;
        } else {
            alert('ASSISTENTE ARASAKA: Como podemos otimizar seu novo amanhã?');
        }
    }

    function initAdmission() {
        audio.play();
        updateVolume();
        audioBtn.innerHTML = '<i class="fas fa-pause"></i> PAUSAR ÁUDIO';
        alert('RECLAMAÇÃO CONFIRMADA!\n\nA Tranquility Corp agradece. Equipe Militech em rota. Chegada em 2 dias úteis.\n\n"O amanhã é Arasaka."');
    }
</script>
</body>
</html>
