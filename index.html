<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRANQUILITY_CLAVIUS_2063</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Orbitron:wght@500;700&family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* MODO 0: NEO-KITSCH */
            --bg-color: #fdfdfd;
            --primary: #d4af37;
            --text: #1a1a1a;
            --box-bg: rgba(255, 255, 255, 0.96);
            --scanline: rgba(0, 0, 0, 0.05);
            --font-main: 'Cinzel', serif;
        }

        /* MODO 1: TERMINAL (ROXO) */
        .dark-mode {
            --bg-color: #020205;
            --primary: #bc13fe;
            --text: #e0e0e0;
            --box-bg: rgba(5, 5, 10, 0.95);
            --scanline: rgba(188, 19, 254, 0.15);
            --font-main: 'VT323', monospace;
        }

        /* MODO 2: RED ROOM (MINIMALISTA) */
        .red-room-mode {
            --bg-color: #4a0404; /* Vermelho Profundo */
            --primary: #ffffff;   /* Fonte Branca para Legibilidade */
            --text: #ffffff;
            --box-bg: rgba(0, 0, 0, 0.8);
            --scanline: rgba(255, 255, 255, 0.05);
            --font-main: 'Montserrat', sans-serif;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text);
            font-family: var(--font-main);
            transition: all 0.5s ease;
            display: flex; align-items: center; justify-content: center;
            overflow-x: hidden;
        }

        body::before {
            content: " "; display: block; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(var(--scanline) 50%, transparent 50%);
            z-index: 100; background-size: 100% 4px; pointer-events: none;
        }

        .wrapper {
            width: 95%; max-width: 600px;
            position: relative; z-index: 150;
            display: flex; flex-direction: column; gap: 15px;
        }

        .audio-ctrl { text-align: center; }
        .btn-play {
            background: none; border: 1px solid var(--primary);
            color: var(--primary); padding: 8px 20px;
            font-family: 'Orbitron', sans-serif; cursor: pointer;
            font-size: 0.7rem; letter-spacing: 2px;
        }

        .header-ui {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--primary); padding-bottom: 10px;
        }

        .terminal {
            background: var(--box-bg);
            border: 1px solid var(--primary);
            padding: 35px; width: 100%;
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; gap: 20px;
        }

        h1 { font-family: 'Orbitron', sans-serif; text-align: center; margin: 0; color: var(--primary); letter-spacing: 5px; }

        .luxe-list { font-style: italic; font-size: 0.95rem; line-height: 1.6; }

        .btn-claim {
            width: 100%; padding: 18px;
            background: none; border: 2px solid var(--primary);
            color: var(--primary); font-family: 'Orbitron', sans-serif;
            cursor: pointer; transition: 0.4s;
        }
        .btn-claim:hover { background: var(--primary); color: #000; }

        .footer-ui { display: flex; justify-content: space-between; font-size: 0.7rem; opacity: 0.8; }
        
        #yt-player { position: absolute; top: -9999px; left: -9999px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="audio-ctrl">
        <button class="btn-play" onclick="toggleAudio()">
            <i id="play-icon" class="fas fa-play"></i> PLAY / PAUSE JAZZ
        </button>
    </div>

    <div class="header-ui">
        <button onclick="cycleMode()" style="background:none; border:1px solid var(--primary); color:var(--primary); cursor:pointer; font-size: 0.7rem;" id="modeBtn">ALTERNAR VISUAL</button>
        <div style="font-size: 0.7rem; color: var(--primary);">
            VOL: <input type="range" min="0" max="1" step="0.1" value="0.4" oninput="updateVol(this.value)" style="accent-color: var(--primary); vertical-align: middle; width: 60px;">
        </div>
    </div>

    <main class="terminal">
        <h1>TRANQUILITY CLAVIUS</h1>
        <p style="text-align: center; margin: 0; font-size: 1.1rem;">VOCÊ FOI SORTEADO!<br>
        <span style="font-size: 0.8rem; opacity: 0.7;">Arasaka Corp © 2063</span></p>

        <div class="luxe-list">
            • OPORTUNIDADE DE EMPREGO<br>
            • CHANCE DE FICAR RICO<br>
            • UM NOVO COMEÇO...<br>
            • TODOS SÃO BEM-VINDOS.
        </div>

        <button class="btn-claim" onclick="alert('ADMISSÃO CONFIRMADA.\nEquipe Militech em rota. Chegada em 2 dias úteis.')">RECLAMAR MINHA CHANCE</button>
    </main>

    <div class="footer-ui">
        <span><i class="fas fa-microchip"></i> ARASAKA_SYSTEMS_2063</span>
        <span onclick="alert('ERROR: Ajuda indisponível.')" style="cursor:help;"><i class="fas fa-question-circle"></i> AJUDA</span>
    </div>
</div>

<div id="yt-player">
    <iframe id="video" width="560" height="315" 
    src="https://www.youtube.com/embed/TmIwm5RElRs?enablejsapi=1&loop=1&playlist=TmIwm5RElRs" 
    frameborder="0"></iframe>
</div>

<script>
    let playing = false;
    let currentMode = 0; 
    const video = document.getElementById('video');

    function toggleAudio() {
        const icon = document.getElementById('play-icon');
        if (!playing) {
            video.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
            icon.className = "fas fa-pause";
            playing = true;
        } else {
            video.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
            icon.className = "fas fa-play";
            playing = false;
        }
    }

    function updateVol(val) {
        video.contentWindow.postMessage('{"event":"command","func":"setVolume","args":['+ (val*100) +']}', '*');
    }

    function cycleMode() {
        const body = document.body;
        currentMode = (currentMode + 1) % 3;
        body.classList.remove('dark-mode', 'red-room-mode');
        
        if (currentMode === 1) body.classList.add('dark-mode');
        else if (currentMode === 2) body.classList.add('red-room-mode');
    }
</script>
</body>
</html>
