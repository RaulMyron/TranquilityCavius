<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRANQUILITY_CLAVIUS_ADMISSION</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Orbitron:wght@500;700&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #fdfdfd;
            --primary: #d4af37;   /* Ouro */
            --secondary: #222;
            --text: #1a1a1a;
            --accent: #8b0000;
            --box-bg: rgba(255, 255, 255, 0.95);
            --grad: radial-gradient(circle, #fff 0%, #e0e0e0 100%);
        }

        .dark-mode {
            --bg-color: #020205; /* Fundo Totalmente Escuro */
            --primary: #bc13fe;   /* Roxo Neon */
            --secondary: #00e5ff; /* Ciano Tech */
            --text: #e0e0e0;
            --box-bg: rgba(5, 5, 10, 0.95);
            --grad: none;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            background-image: var(--grad);
            color: var(--text);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Cinzel', serif;
            transition: all 0.5s ease;
            overflow-x: hidden;
        }

        .dark-mode { font-family: 'VT323', monospace; }

        .wrapper {
            width: 90%; max-width: 500px;
            display: flex; flex-direction: column; gap: 20px;
            z-index: 5;
        }

        /* Botão Central "Click Here" */
        .entry-gate {
            text-align: center; margin-bottom: 20px;
        }

        .btn-gate {
            background: none; border: 1px solid var(--primary);
            color: var(--primary); padding: 10px 20px;
            font-family: 'Orbitron', sans-serif; font-size: 0.7rem;
            letter-spacing: 3px; cursor: pointer; transition: 0.3s;
        }

        .btn-gate:hover { background: var(--primary); color: white; }

        .terminal {
            background: var(--box-bg);
            border: 1px solid var(--primary);
            padding: 30px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 { font-size: 1.5rem; letter-spacing: 5px; color: var(--primary); margin: 0 0 15px 0; }

        .btn-claim {
            width: 100%; padding: 15px; margin-top: 20px;
            background: none; border: 2px solid var(--primary);
            color: var(--primary); font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
        }

        .btn-claim:hover { background: var(--primary); color: #fff; }

        /* UI de Controles */
        .ui-footer {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.8rem; border-top: 1px solid var(--primary); padding-top: 10px;
        }

        .help-icon { cursor: pointer; color: var(--primary); transition: 0.3s; }
        .help-icon:hover { transform: scale(1.2); color: var(--accent); }

        .volume-ctrl { display: flex; align-items: center; gap: 5px; }
        input[type=range] { accent-color: var(--primary); width: 60px; }

        /* Estilo da data Arasaka */
        .copyright { font-size: 0.6rem; opacity: 0.7; letter-spacing: 2px; }

        .mode-btn { 
            background: none; border: 1px solid var(--primary); 
            color: var(--primary); cursor: pointer; font-size: 0.7rem;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="entry-gate">
        <button class="btn-gate" onclick="toggleMode()" id="modeBtn">
            <i class="fas fa-eye"></i> PLS CLICK HERE TO SWITCH VIEW
        </button>
    </div>

    <main class="terminal">
        <h1 id="title">TRANQUILITY CLAVIUS</h1>
        <p style="font-size: 0.9rem; font-style: italic;">"Sorteio Biopsicossocial #2063"</p>
        
        <p style="margin: 20px 0; line-height: 1.5;">
            Você foi consagrado para o novo empreendimento orbital.<br>
            <span style="color: var(--primary); font-weight: bold;">Riqueza. Luxúria. Um novo começo.</span>
        </p>

        <button class="btn-claim" onclick="initAdmission()">RECLAMAR MINHA CHANCE</button>
    </main>

    <div class="ui-footer">
        <div class="copyright">
            <i class="fas fa-microchip"></i> ARASAKA CORP © 2063
        </div>
        
        <div class="volume-ctrl">
            <i class="fas fa-volume-low"></i>
            <input type="range" id="vol" min="0" max="1" step="0.1" value="0.3" oninput="updateVol()">
        </div>

        <div class="help-icon" onclick="showHelp()">
            <i class="fas fa-question-circle"></i> AJUDA
        </div>
    </div>
</div>

<audio id="music" loop><source src="som.mp3" type="audio/mpeg"></audio>

<script>
    const music = document.getElementById('music');
    let helpCount = 0;

    function toggleMode() {
        document.body.classList.toggle('dark-mode');
        const btn = document.getElementById('modeBtn');
        btn.innerHTML = document.body.classList.contains('dark-mode') ? 
            '<i class="fas fa-sun"></i> MODO NEO-KITSCH' : 
            '<i class="fas fa-moon"></i> MODO TERMINAL';
    }

    function updateVol() { music.volume = document.getElementById('vol').value; }

    function showHelp() {
        if(helpCount === 0) {
            alert('AURA_SYSTEM_ERROR: "Por favor... não vá. O ouro é falso. O sangue é real."');
            helpCount++;
        } else {
            alert('ASSISTENTE ARASAKA: Como podemos otimizar sua jornada hoje?');
        }
    }

    function initAdmission() {
        music.play();
        updateVol();
        alert('ADMISSÃO CONFIRMADA!\n\nUma equipe Militech chegará em sua localização em 2 dias úteis.\n\n"O amanhã é um privilégio Arasaka."');
    }
</script>
</body>
</html>
