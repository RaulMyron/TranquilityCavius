<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARASAKA TERMINAL // CLAVIUS</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: #0d0d0f;
    color: #d4af37;
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ── TITLEBAR estilo Windows Terminal ── */
.titlebar {
    background: #1a1a1f;
    border-bottom: 1px solid #2a2a35;
    display: flex;
    align-items: center;
    padding: 0 16px;
    height: 40px;
    gap: 12px;
    flex-shrink: 0;
    user-select: none;
}
.titlebar-icon { font-size: 0.75rem; color: #d4af37; letter-spacing: 2px; }
.tab {
    background: #0d0d0f;
    border-top: 2px solid #d4af37;
    padding: 0 16px;
    height: 100%;
    display: flex;
    align-items: center;
    font-size: 0.72rem;
    letter-spacing: 1px;
    color: #d4af37;
    gap: 8px;
}
.tab-dot { width: 6px; height: 6px; border-radius: 50%; background: #d4af37; }
.titlebar-spacer { flex: 1; }
.titlebar-btns { display: flex; gap: 8px; }
.titlebar-btns span {
    width: 12px; height: 12px; border-radius: 50%;
    display: inline-block; cursor: pointer; opacity: 0.7;
}
.btn-close { background: #ff5f57; }
.btn-min   { background: #febc2e; }
.btn-max   { background: #28c840; }
.btn-back  {
    background: none; border: 1px solid #d4af37;
    color: #d4af37; padding: 2px 10px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem; letter-spacing: 1px;
    cursor: pointer; transition: 0.2s;
    text-decoration: none;
}
.btn-back:hover { background: #d4af37; color: #000; }

/* ── CORPO DO TERMINAL ── */
.terminal-body {
    display: flex;
    flex: 1;
    overflow: hidden;
}

/* ── PAINEL ESQUERDO (explorador) ── */
.explorer {
    width: 280px;
    flex-shrink: 0;
    border-right: 1px solid #2a2a35;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.explorer-header {
    background: #141418;
    padding: 8px 14px;
    font-size: 0.62rem;
    letter-spacing: 2px;
    color: #d4af37;
    opacity: 0.5;
    border-bottom: 1px solid #2a2a35;
    flex-shrink: 0;
}
.explorer-tree {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
}
.explorer-tree::-webkit-scrollbar { width: 4px; }
.explorer-tree::-webkit-scrollbar-track { background: transparent; }
.explorer-tree::-webkit-scrollbar-thumb { background: #2a2a35; }

.tree-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 14px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: background 0.15s;
    color: #c8c8c8;
    letter-spacing: 0.5px;
}
.tree-item:hover { background: #1e1e28; }
.tree-item.selected {
    background: #1e1e28;
    color: #d4af37;
    outline: 1px solid #d4af3733;
}
.tree-item.focused {
    background: #2a2a10;
    color: #d4af37;
    outline: 1px solid #d4af37;
}
.tree-icon { font-size: 0.85rem; flex-shrink: 0; }
.tree-indent { display: inline-block; }

/* ── PAINEL DIREITO (conteúdo) ── */
.viewer {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.viewer-header {
    background: #141418;
    padding: 8px 20px;
    font-size: 0.62rem;
    letter-spacing: 2px;
    color: #d4af37;
    opacity: 0.5;
    border-bottom: 1px solid #2a2a35;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
}
.viewer-content {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
    line-height: 1.8;
}
.viewer-content::-webkit-scrollbar { width: 4px; }
.viewer-content::-webkit-scrollbar-track { background: transparent; }
.viewer-content::-webkit-scrollbar-thumb { background: #2a2a35; }

/* Estados do viewer */
.view-idle {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
    gap: 12px;
    opacity: 0.25;
}
.view-idle .big-logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 2rem;
    letter-spacing: 4px;
    color: #d4af37;
}
.view-idle .hint { font-size: 0.72rem; letter-spacing: 2px; }

/* Conteúdo de pasta */
.folder-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 3px;
    color: #d4af37;
    border-bottom: 1px solid #d4af3744;
    padding-bottom: 10px;
    margin-bottom: 20px;
}
.folder-desc {
    font-size: 0.78rem;
    color: #888;
    margin-bottom: 24px;
    line-height: 1.7;
}
.file-list { display: flex; flex-direction: column; gap: 6px; }
.file-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border: 1px solid #2a2a35;
    background: #141418;
    font-size: 0.78rem;
    color: #c8c8c8;
    cursor: pointer;
    transition: 0.15s;
}
.file-chip:hover { border-color: #d4af37; color: #d4af37; }
.file-chip .fc-icon { color: #d4af37; opacity: 0.6; }
.file-chip .fc-name { flex: 1; }
.file-chip .fc-hint { font-size: 0.65rem; opacity: 0.4; letter-spacing: 1px; }

/* Conteúdo de arquivo */
.entry-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 2px;
    color: #d4af37;
    margin-bottom: 6px;
}
.entry-meta {
    font-size: 0.65rem;
    color: #888;
    letter-spacing: 2px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid #2a2a35;
}
.entry-body {
    font-size: 0.8rem;
    color: #c8c8c8;
    line-height: 1.9;
}
.entry-body p { margin-bottom: 14px; }
.entry-body strong { color: #d4af37; }
.entry-classification {
    margin-top: 24px;
    padding-top: 12px;
    border-top: 1px dashed #2a2a35;
    font-size: 0.65rem;
    color: #d4af37;
    opacity: 0.35;
    letter-spacing: 1px;
}

/* AURA glitch */
.aura-msg {
    color: #bc13fe;
    font-size: 0.72rem;
    letter-spacing: 1px;
    opacity: 0;
    animation: fadeInOut 4s forwards;
}
@keyframes fadeInOut {
    0%   { opacity: 0; }
    20%  { opacity: 1; }
    80%  { opacity: 1; }
    100% { opacity: 0.3; }
}

/* ── STATUSBAR ── */
.statusbar {
    background: #d4af37;
    color: #0d0d0f;
    padding: 3px 16px;
    font-size: 0.62rem;
    letter-spacing: 2px;
    display: flex;
    justify-content: space-between;
    flex-shrink: 0;
}

/* ── HINT BAR ── */
.hintbar {
    background: #141418;
    border-top: 1px solid #2a2a35;
    padding: 5px 16px;
    font-size: 0.62rem;
    letter-spacing: 1px;
    color: #888;
    display: flex;
    gap: 20px;
    flex-shrink: 0;
}
.hintbar kbd {
    background: #2a2a35;
    color: #d4af37;
    padding: 1px 6px;
    border-radius: 2px;
    font-family: 'Share Tech Mono', monospace;
}
</style>
</head>

                { type: 'file', id: 'mundo2063', label: 'O_MUNDO_EM_2063.txt',
                  meta: 'VISÃO GERAL // NÍVEL: PÚBLICO',

                { type: 'file', id: 'timeofthered', label: 'TIME_OF_THE_RED.txt',

                  body: `<p>Fundada no Japão no século XX, a Arasaka é hoje a maior corporação de segurança privada e serviços financeiros do mundo. Sua influência se estende por todos os continentes, com contratos com governos, corporações menores e indivíduos de alto patrimônio.</p><p>A Arasaka acredita que ordem, hierarquia e tradição são os únicos caminhos viáveis para um mundo estável. Essa filosofia permeia todos os seus produtos e serviços — incluindo as iniciativas de bem-estar humano como o programa <strong>Tranquility Clavius</strong>.</p>`,

// ════════════════════════════════════════
//  ESTADO
// ════════════════════════════════════════
let currentFolder = FS;   // pasta atual
let flatItems     = [];   // itens visíveis na árvore
let focusedIdx    = 0;    // índice focado
let stack         = [];   // histórico de navegação

// ════════════════════════════════════════
//  RENDER ÁRVORE
// ════════════════════════════════════════
function buildFlat(node, depth, result) {
    if (!node.children) return;
    node.children.forEach(child => {
        result.push({ node: child, depth });
        if (child.type === 'folder' && child._open) {
            buildFlat(child, depth + 1, result);
        }
    });
}

function renderTree() {
    flatItems = [];

    // item ".." como primeiro elemento navegável se estamos em subpasta
    if (stack.length > 0) {
        flatItems.push({ node: { type: '__back__', label: '../' }, depth: 0 });
    }

    buildFlat(currentFolder, 0, flatItems);

    const tree = document.getElementById('tree');
    tree.innerHTML = '';

    flatItems.forEach((item, i) => {
        const el = document.createElement('div');
        el.className = 'tree-item' + (i === focusedIdx ? ' focused' : '');
        el.dataset.idx = i;

        const isBack = item.node.type === '__back__';
        const indent = '&nbsp;'.repeat(item.depth * 4);
        const icon   = isBack ? '📁' : item.node.type === 'folder' ? '📂' : getFileIcon(item.node.label);
        const color  = isBack ? 'color:#888;' : '';

        el.style.cssText = color;
        el.innerHTML = `<span class="tree-indent">${indent}</span><span class="tree-icon">${icon}</span><span>${item.node.label}</span>`;
        el.addEventListener('click', () => {
            focusedIdx = i;
            renderTree();
            if (isBack) goBack(); else openItem(item.node);
        });
        tree.appendChild(el);
    });

    // scroll pro item focado
    const focused = tree.querySelector('.focused');
    if (focused) focused.scrollIntoView({ block: 'nearest' });

    updateStatus();
}

function getFileIcon(label) {
    if (label.endsWith('.tmp')) return '⚠️';
    return '📄';
}

// ════════════════════════════════════════
//  NAVEGAÇÃO
// ════════════════════════════════════════
function openItem(node) {
    if (node.type === 'folder') {
        stack.push(currentFolder);
        currentFolder = node;
        focusedIdx = 0;
        renderTree();
        showFolder(node);
    } else {
        showFile(node);
    }
}

function goBack() {
    if (stack.length === 0) return;
    currentFolder = stack.pop();
    focusedIdx = 0;
    renderTree();
    showFolder(currentFolder);
}

// ════════════════════════════════════════
//  VIEWER
// ════════════════════════════════════════
function showFolder(node) {
    const path = buildPath();
    document.getElementById('viewer-path').textContent = path;
    document.getElementById('viewer-type').textContent = 'PASTA';

    const files = node.children || [];
    const chips = files.map(f => `
        <div class="file-chip" onclick="">
            <span class="fc-icon">${f.type === 'folder' ? '📂' : getFileIcon(f.label)}</span>
            <span class="fc-name">${f.label}</span>
            <span class="fc-hint">${f.type === 'folder' ? 'PASTA' : 'ARQUIVO'}</span>
        </div>`).join('');

    document.getElementById('viewer-content').innerHTML = `
        <div class="folder-title">${node.label}</div>
        <div class="folder-desc">${node.desc || ''}</div>
        <div class="file-list">${chips}</div>
    `;
}

function showFile(node) {
    const path = buildPath() + node.label;
    document.getElementById('viewer-path').textContent = path;
    document.getElementById('viewer-type').textContent = 'ARQUIVO';

    const isSecret = node.id === 'aura_sys';

    document.getElementById('viewer-content').innerHTML = `
        <div class="entry-title">${node.label.replace('.txt','').replace('.tmp','')}</div>
        <div class="entry-meta">${node.meta || ''}</div>
        <div class="entry-body">${node.body}</div>
        <div class="entry-classification">${node.classification || ''}</div>
        ${isSecret ? `<div class="aura-msg" style="margin-top:24px;">// AURA: Acesso a este arquivo foi registrado. Tenha um bom dia.</div>` : ''}
    `;
}

function buildPath() {
    const parts = ['ARASAKA:\\'];
    stack.forEach(s => { if (s !== FS) parts.push(s.label.split('—')[0].trim() + '\\'); });
    if (currentFolder !== FS) parts.push(currentFolder.label.split('—')[0].trim() + '\\');
    return parts.join('');
}

function updateStatus() {
    const total = flatItems.length;
    const cur   = total > 0 ? focusedIdx + 1 : 0;
    document.getElementById('status-left').textContent =
        `SISTEMA AURA v2.4 // ONLINE — ${cur}/${total} ITENS`;
}

// ════════════════════════════════════════
//  TECLADO
// ════════════════════════════════════════
document.addEventListener('keydown', e => {
    const total = flatItems.length;
    if (total === 0) return;

    if (e.key === 'ArrowUp') {
        e.preventDefault();
        focusedIdx = Math.max(0, focusedIdx - 1);
        renderTree();
    } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        focusedIdx = Math.min(total - 1, focusedIdx + 1);
        renderTree();
    } else if (e.key === 'z' || e.key === 'Z' || e.key === 'Enter') {
        e.preventDefault();
        const item = flatItems[focusedIdx];
        if (!item) return;
        if (item.node.type === '__back__') goBack(); else openItem(item.node);
    } else if (e.key === 'Backspace') {
        e.preventDefault();
        goBack();
    } else if (e.key === 'Escape') {
        e.preventDefault();
        stack = [];
        currentFolder = FS;
        focusedIdx = 0;
        renderTree();
        document.getElementById('viewer-content').innerHTML = `
            <div class="view-idle">
                <div class="big-logo">ARASAKA</div>
                <div class="hint">SELECIONE UM ARQUIVO PARA LER</div>
                <div class="hint">↑↓ NAVEGAR &nbsp;·&nbsp; Z / ENTER ABRIR</div>
            </div>`;
        document.getElementById('viewer-path').textContent = 'ARASAKA:\\>';
        document.getElementById('viewer-type').textContent = '';
    }
});

// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
renderTree();
</script>
</body>
</html>
